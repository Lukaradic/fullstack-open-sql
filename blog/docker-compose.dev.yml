services:
  database:
    image: postgres:16
    container_name: blog-app-database-dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  server:
    build:
      context: .
      dockerfile: dev.Dockerfile
    environment:
      DATABASE_URL: "postgres://user:password@database:5432/mydb"
    ports:
      - 3001:3001
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - database

volumes:
  postgres_data:
