services:
  postgres:
    image: postgres:16
    container_name: notes-dev-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: dev.Dockerfile
    container_name: notes-dev-server
    ports:
      - 3001:3001
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_URL: "postgres://user:password@postgres:5432/mydb"
    depends_on:
      - postgres
